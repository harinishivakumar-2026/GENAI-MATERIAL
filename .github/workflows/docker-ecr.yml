name: Deploy Travel Agent to Amazon ECR

on:
  push:
    branches:
      - master
    # IMPORTANT: Only trigger if files in the Travel Agent directory change
    paths:
      - 'TRAVEL-LANGGRAPH-AGENT/langgraph-agent/**'

permissions:
  contents: read

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Move to the directory where the Dockerfile lives
          cd TRAVEL-LANGGRAPH-AGENT/langgraph-agent
          
          # 2. Build the image
          # The '.' here points to langgraph-agent/ as the build context
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # 3. Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest